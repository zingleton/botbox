<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botbox</title>
    <!--
      No inline <script> or <style>: the strict CSP in tauri.conf.json forbids
      'unsafe-inline'. All JS comes from /main.ts (a module) and all CSS from
      stylesheets Vite emits (styles.css + xterm's bundled CSS).
    -->
  </head>
  <body>
    <!--
      Single-panel top-nav shell. One content surface is shown at a time:
      a top bar (brand + nav + connection status), a selected-bot line with the
      Hermes/Dashboard/Linux context links, an error region, and a content area
      that hosts either a dialog panel (#content-panel) or one of the two
      persistent terminals. main.ts renders into each region from state.
    -->
    <div id="app" class="app">
      <header class="topbar">
        <span class="brand">Botbox</span>
        <!-- Top-level nav: Connect/Disconnect, Select a Bot, Settings (U3). -->
        <nav class="topbar__nav" id="nav-region"></nav>
        <!-- Connection-phase status text only — errors live in #error-region (U3). -->
        <span class="topbar__status" id="status-region"></span>
      </header>

      <!--
        Selected-bot line (U3): <bot name> + Hermes / Dashboard / Linux links.
        Empty until a bot is selected.
      -->
      <div class="selected-bot" id="selected-bot-region"></div>

      <!--
        Error-class surface (U7 / R6): each failure class renders its own
        distinct, actionable card here, above the content area, regardless of
        which view is active. Empty until an error is surfaced.
      -->
      <section class="error-region" id="error-region"></section>

      <!--
        Content area (U4): shows ONE surface at a time. #content-panel is the
        replaceChildren target for dialogs (bot list / Settings / first-run CTA);
        the two terminal containers are PERSISTENT siblings (never destroyed) that
        the router shows/hides via the .hidden class so their xterm scrollback and
        live PTY survive view switches.
      -->
      <main class="content" id="content">
        <!--
          Dialog panel: the bot list + add/edit form (Select a Bot) and the
          public-key controls (Settings). The existing controllers render into
          these region ids; the router (main.ts) shows/hides them per view.
        -->
        <div class="content-panel" id="content-panel">
          <div id="bot-list-region"></div>
          <div id="bot-form-region"></div>
          <div id="key-region"></div>
        </div>
        <!-- Persistent terminals: shown one at a time, never destroyed (U5). -->
        <div class="term-pane hidden" id="terminal-host"></div>
        <div class="term-pane hidden" id="terminal-attach"></div>
      </main>
    </div>

    <!--
      Modal mount point (U7 / KTD5): the first-contact host-key trust modal
      mounts here, above the app shell. Empty until a host-key prompt arrives.
    -->
    <div id="modal-region"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
